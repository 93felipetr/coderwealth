name: Deploy Oficial

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4
        
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Limpeza Agressiva no Servidor (Remove caches e permissoes do Windows)
        run: rm -rf node_modules package-lock.json

      - name: Instalar Dependencias (Linux Nativo)
        run: npm install

      - name: Compilar Site Estatico
        run: npm run build

      - name: Upload para o GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar Site
        id: deployment
        uses: actions/deploy-pages@v4